name: PR Checks

on:
  pull_request:
    branches: [main]

env:
  BASE_URL: https://demowebshop.tricentis.com
  CI: "true"

jobs:
  # ── Static checks (no browser needed) ───────────────────────────────────────

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm audit --audit-level=high

  # ── Browser test suites (all run in parallel) ────────────────────────────────

  smoke:
    name: "Tests: Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run smoke tests
        run: npm run test:smoke
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-smoke-${{ github.run_number }}
          path: reports/html/
          retention-days: 7

  ui-login:
    name: "Tests: UI Login"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run UI login tests
        run: npm run test:ui
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-ui-${{ github.run_number }}
          path: reports/html/
          retention-days: 7

  accessibility:
    name: "Tests: Accessibility"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run accessibility tests
        run: npm run test:a11y
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-a11y-${{ github.run_number }}
          path: reports/html/
          retention-days: 7

  security:
    name: "Tests: Security"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run security tests
        run: npm run test:security
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-security-${{ github.run_number }}
          path: reports/html/
          retention-days: 7

  session:
    name: "Tests: Session Management"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run session management tests
        run: npm run test:session
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-session-${{ github.run_number }}
          path: reports/html/
          retention-days: 7

  xss:
    name: "Tests: XSS Input Validation"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run XSS tests
        run: npm run test:xss
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-xss-${{ github.run_number }}
          path: reports/html/
          retention-days: 7
